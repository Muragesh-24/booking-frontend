name: Frontend CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/booking-frontend

            git pull origin main

            echo "${{ secrets.FRONTEND_ENV_FILE }}" > ganeshbooking/.env

            cd ganeshbooking

            docker stop booking-frontend || true
            docker rm booking-frontend || true

            docker build \
              --build-arg NEXT_PUBLIC_API_URL=$(grep NEXT_PUBLIC_API_URL .env | cut -d '=' -f2-) \
              --build-arg NEXT_PUBLIC_ADMIN_API_URL=$(grep NEXT_PUBLIC_ADMIN_API_URL .env | cut -d '=' -f2-) \
              --build-arg NEXT_PUBLIC_CAPTCHA_SITE_KEY=$(grep NEXT_PUBLIC_CAPTCHA_SITE_KEY .env | cut -d '=' -f2-) \
              -t booking-frontend .

            docker run -d \
              --name booking-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              booking-frontend